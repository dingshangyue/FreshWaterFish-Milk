comments:
  _v:
    comment:
      - '源代码仓库: https://github.com/QianMo0721/Luminara'
      - '提交反馈/错误报告: https://github.com/QianMo0721/Luminara/issues'
      - ''
      - ''
      - 配置文件版本号，请勿编辑
  async-catcher:
    comment:
      - 异步捕获相关设置
      - Async Catcher 共有四种模式
      - NONE - 保持在当前线程执行
      - DISPATCH - 不阻塞地发布到主线程
      - BLOCK - 发布到主线程并等待结果
      - EXCEPTION - 抛出异常
    dump:
      comment: 是否在 debug 日志中打印堆栈信息
  async-world-save:
    comment:
      - 异步世界保存相关设置
      - 在服务器关闭时异步保存世界数据，减少关服等待时间
    enabled:
      comment: 是否启用异步世界保存功能
    save-world-data:
      comment: 是否在异步保存中包含世界数据
    timeout-seconds:
      comment:
        - 异步保存超时时间（秒）
        - 如果在指定时间内��存未完成，服务器将继续关闭流程
  compatibility:
    extra-logic-worlds:
      comment:
        - 额外运行逻辑的维度类名
        - 如果有模组世界/功能运行不正常，尝试在日志中搜索和 [EXT_LOGIC] 有关的对应类名并添加
    forward-permission:
      comment:
        - true - 将 Forge 权限查询请求转发至 Bukkit
        - false - 不启用权限转发
        - reverse - 将 Bukkit 玩家权限查询请求转发至 Forge
    lenient-item-tag-match:
      comment:
        - 允许空 NBT 标签的物品和没有 NBT 标签的物品堆叠
    preload-bungee-chat-classes:
      comment:
        - 是否在启动时预加载Bungee聊天API类
        - 这有助于修复某些插件无法正确加载BungeeChat API的问题
        - 如果您遇到某些插件的兼容性问题，可以设置为false
    symlink-world:
      comment:
        - 为模组的维度创建符号链接
        - 推荐启用以增强插件交互兼容性
        - 变更此设置会导致模组世界名称变化，可能造成依赖世界名称的插件数据丢失
        - 参见 https://github.com/IzzelAliz/Arclight/wiki/World-Symlink
    valid-username-regex:
      comment:
        - 用户名合法检查正则表达式，留空为使用原版检查
        - 如果需要允许中文字符可以使用
        - valid-username-regex = "^[ -~\p{sc=Han}]{1,16}$"
        - 如果允许任何用户名可以使用
        - valid-username-regex = ".+"
  error-handling:
    comment:
      - 错误处理相关设置
      - 控制服务器在遇到崩溃和错误时的行为
    continue-on-crash:
      comment: 是否在崩溃后继续运行服务器（默认关闭，建议保持关闭）
    crash-report-directory:
      comment: 崩溃报告文件存储目录
  locale:
    comment: 语言/国际化相关设置
  logging:
    comment: 日志输出相关设置
    use-simple-format:
      comment:
        - 是否使用简化的日志输出格式
        - true - 使用简洁格式（隐藏线程名和类名，类似Mohist风格）
        - false - 使用详细格式（显示完整的线程名、类名等调试信息）
  optimization:
    async-system:
      async-ai-enabled:
        comment: 是否启用异步AI
      async-collision-enabled:
        comment: 是否启用异步碰撞检测
      async-redstone-enabled:
        comment: 是否启用异步红石
      comment: 异步系统相关设置
      disable-on-error:
        comment: 出错时是否禁用异步系统
      enabled:
        comment: 是否启用异步系统
      event-class-blacklist:
        comment: 事件类黑名单
      max-threads:
        comment: 最大线程数
      mod-blacklist:
        comment: 模组黑名单
      strict-class-checking:
        comment: 是否启用严格类检查
      timeout-seconds:
        comment: 超时时间（秒）
    cache-plugin-class:
      comment: 是否缓存插件类以提高性能
    chunk-optimization:
      aggressive-chunk-unloading:
        comment: 是否启用激进的区块卸载
      chunk-load-rate-limit:
        comment: 区块加载速率限制
      chunk-unload-delay:
        comment: 区块卸载延迟（tick）
      comment: 区块优化相关设置
      optimize-chunk-loading:
        comment: 是否优化区块加载
    comment: 服务端优化相关设置
    entity-optimization:
      chunk-entity-limit:
        comment: 区块实体限制
      comment: 实体优化相关设置
      disable-entity-collisions:
        comment: 是否禁用实体碰撞检测
      entity-check-interval:
        comment: 实体检查间隔（tick）
      entity-update-distance:
        comment: 实体更新距离
      max-entities-per-chunk:
        comment: 每个区块最大实体数量
      max-entities-per-type:
        comment: 每种类型最大实体数量
      reduce-entity-updates:
        comment: 是否减少实体更新频率
    goal-selector-update-interval:
      comment:
        - 实体目标选择器的更新间隔
        - 数值越高消耗资源越少
        - 导致实体更改目标速度变慢
    memory-optimization:
      cache-cleanup-enabled:
        comment: 是否启用缓存清理
      cache-cleanup-interval:
        comment: 缓存清理间隔（秒）
      comment: 内存优化相关设置
    world-creation:
      async-world-data-loading:
        comment: 是否异步加载世界数据
      comment: 世界创建相关设置
      defer-spawn-area-preparation:
        comment: 是否延迟出生区域准备
      early-world-list-addition:
        comment: 是否提前添加到世界列表
      fast-world-creation:
        comment: 是否启用快速世界创建
      force-close-loading-screen:
        comment: 是否强制关闭加载屏幕
      max-concurrent-world-loads:
        comment: 最大并发世界加载数
      optimize-world-border-setup:
        comment: 是否优化世界边界设置
      parallel-world-initialization:
        comment: 是否并行初始化世界
      skip-spawn-chunk-loading:
        comment: 是否跳过出生点区块加载
      spawn-area-radius:
        comment: 出生区域半径
      world-init-timeout-seconds:
        comment: 世界初始化超时时间（秒）
  velocity:
    comment: Velocity Modern 转发相关设置
    debug-logging:
      comment:
        - 是否在日志中显示 Velocity 转发相关的调试信息
        - 启用后可以帮助诊断玩家连接问题
    enabled:
      comment:
        - 是否启用 Velocity Modern 转发支持
        - 启用后可以与 Velocity 代理服务器配合使用
    forwarding-secret:
      comment:
        - Velocity 转发密钥
        - 必须与 Velocity 配置文件中的 forwarding-secret 完全一致
        - 用于验证来自 Velocity 的连接请求
    online-mode:
      comment:
        - 是否启用在线模式验证
        - 通常应与 Velocity 配置中的 online-mode 设置保持一致
