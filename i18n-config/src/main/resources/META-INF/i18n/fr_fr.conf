  ]
  locale.comment = "Langage/paramètres I18n"
  optimization {
    comment = "Paramètres d'optimisation"
    disable-data-fixer.comment = [
      "Désactiver le système DataFixerUpper utilisé pour la mise à jour des mondes."
      "Cela peut accélérer le démarrage et le chargement des mondes ainsi que réduire l'utilisation de la mémoire de 80 à 200 Mo,"
      "Arclight et ses développeurs ne sont pas responsables de toute perte ou corruption de données."
      "NE PAS UTILISER EN PRODUCTION !"
    ]
  }
  async-catcher.comment = [
    "Paramètres Async Catcher"
    "Il existe quatre modes, le mode BLOCK est recommandé !"
    "NONE - Ne fait rien"
    "DISPATCH - Ne bloque rien et affiche les informations dans la console"
    "BLOCK - Continue l'execution dans le thread principal"
    "EXCEPTION - Affiche une erreur dans la console"
  ]
  async-catcher.dump.comment = "Affiche les informations contenues dans le fichier debug.log"
  compatibility {
    symlink-world.comment = [
      "Créer des liens symboliques vers les dossiers de dimensions de mods qui correspondent aux noms de monde Bukkit"
      "Activer ceci peut améliorer la compatibilité des plugins"
      "Changer ceci sur un serveur de production causera des changements aux noms de monde des mods"
      "  et causera une perte de données sur les plugins dépendant des noms de monde"
      "Voir https://github.com/IzzelAliz/Arclight/wiki/World-Symlink pour plus de détails"
    ]
    extra-logic-worlds.comment = [
      "Mondes supplémentaires exécutant la logique"
      "Si des mods ne fonctionnent pas bien, essayez de chercher les noms de classe dans les logs liés à [EXT_LOGIC] et ajoutez-les ici"
    ]
    forward-permission.comment = [
      "true - Transférer les requêtes de permission Forge vers Bukkit"
      "false - Désactiver le transfert de permission"
      "reverse - Transférer les requêtes de permission de joueur Bukkit vers Forge"
    ]
    valid-username-regex.comment = [
      "Regex pour la vérification de nom d'utilisateur valide. Laissez vide pour utiliser la vérification vanilla"
      "Ce qui suit permet les caractères chinois:"
      "valid-username-regex = \"^[ -~\\\\p{sc=Han}]{1,16}$\""
      "Ce qui suit permet n'importe quel nom d'utilisateur de se connecter:"
      "valid-username-regex = \".+\""
    ]
    lenient-item-tag-match.comment = [
      "Permet aux objets avec un tag nbt vide de s'empiler sur les objets sans tag"
    ]
    velocity-forwarding.comment = [
      "Paramètres de proxy Velocity Modern Forwarding"
      "Porté depuis le mod Proxy-Compatible-Forge"
      "https://github.com/adde0109/Proxy-Compatible-Forge"
    ]
    velocity-forwarding.enabled.comment = [
      "Activer le support Velocity Modern Forwarding"
      "Lorsqu'activé, le serveur acceptera les connexions transférées depuis le proxy Velocity"
      "Doit être utilisé avec un serveur proxy Velocity"
    ]
    velocity-forwarding.secret.comment = [
      "Clé secrète de transfert Velocity"
      "Doit correspondre exactement au contenu du fichier forwarding.secret du serveur proxy Velocity"
      "Utilisez 'openssl rand -hex 32' pour générer une clé sécurisée"
      "Exemple: \"a1b2c3d4e5f6789012345678901234567890abcdef1234567890abcdef123456\""
    ]
    velocity-forwarding.online-mode.comment = [
      "Si le serveur proxy est en mode en ligne"
      "true - Le serveur proxy a l'authentification activée (recommandé)"
      "false - Le serveur proxy n'a pas l'authentification activée"
      "Note: Le server.properties du serveur backend doit avoir online-mode=false"
    ]
  }
