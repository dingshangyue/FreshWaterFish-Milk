comments:
  _v:
    comment:
      - '레포지트리: https://github.com/QianMo0721/Luminara'
      - '이슈 트래커: https://github.com/QianMo0721/Luminara/issues'
      - ''
      - ''
      - 설정 버전 번호, 편집하지 마세요.
  async-catcher:
    comment:
      - Async Catcher 관련 설정
      - 네 개의 모드가 있으며, BLOCK로 설정하는 것을 권장합니다.
      - NONE - 아무 것도 하지 않음
      - DISPATCH - 주 스레드에 올리지 않고 백그라운드에서 실행
      - BLOCK - 주 스레드에 올리고 결과를 대기
      - EXCEPTION - 오류를 발생
    dump:
      comment: 스택 추적 덤프 정보는 debug.log에 있습니다.
  async-world-save:
    comment:
      - 비동기 월드 저장 관련 설정
      - 서버 종료 시 월드 데이터를 비동기적으로 저장하여 종료 시간을 단축합니다
    enabled:
      comment: 비동기 월드 저장 기능을 활성화할지 여부
    save-world-data:
      comment: 비동기 저장에 월드 데이터를 포함할지 여부
    timeout-seconds:
      comment:
        - 비동기 저장 타임아웃 시간(초)
        - 이 시간 내에 저장이 완료되지 않으면 서버는 종료 프로세스를 계속합니다
  compatibility:
    extra-logic-worlds:
      comment:
        - 별도 세계 작동 로직
        - 제대로 작동하지 않는 모드가 있다면, 로그 파일에서 [EXT_LOGIC]와 관련된 클래스 명을
        - '  찾아 여기에 추가해 주세요.'
    forward-permission:
      comment:
        - true - Forge의 권한 쿼리를 Bukkit으로 넘깁니다.
        - false - 권한 넘기기를 비활성화합니다.
        - reverse - Bukkit의 권한 쿼리를 Forge로 넘깁니다.
    lenient-item-tag-match:
      comment:
        - 빈 nbt 태그가 있는 아이템이 태그가 없는 아이템과 스택되도록 허용
    preload-bungee-chat-classes:
      comment:
        - 서버 시작 시 Bungee 채팅 API 클래스의 사전 로드를 활성화할지 여부
        - 일부 플러그인이 BungeeChat API를 제대로 로드하지 못하는 문제를 해결하는 데 도움이 됩니다
        - 특정 플러그인과의 호환성 문제 발생 시 false로 설정하세요
    symlink-world:
      comment:
        - 버킷 포맷에 맞도록 모드 차원 폴더에 대한 Symbolic Link를 생성합니다.
        - 활성화하면 플러그인과의 호환성을 향상시킬 수 있습니다.
        - 이 설정을 수정하면 모드의 월드 명칭이 바뀌어 월드 명칭에 의존하는 플러그인의
        - '  데이터 손실이 발생할 수 있습니다.'
        - https://github.com/IzzelAliz/Arclight/wiki/World-Symlink (영문)에서 자세한
        - '  내용을 확인하세요.'
    valid-username-regex:
      comment:
        - 유효한 사용자명 확인을 위한 정규식. 비워두면 바닐라 확인을 사용합니다
        - '다음은 중국어 문자를 허용합니다:'
        - valid-username-regex = "^[ -~\\p{sc=Han}]{1,16}$"
        - '다음은 모든 사용자명의 로그인을 허용합니다:'
        - valid-username-regex = ".+"
  error-handling:
    comment:
      - 오류 처리 관련 설정
      - 크래시 및 오류 발생 시 서버 동작을 제어합니다
    continue-on-crash:
      comment: 크래시 후 서버를 계속 실행할지 여부 (기본값 비활성화, 비활성화 유지 권장)
    crash-report-directory:
      comment: 크래시 리포트 파일 저장 디렉토리
  locale:
    comment: 언어/I18n 설정
  logging:
    comment: 로그 출력 관련 설정
    use-simple-format:
      comment:
        - 단순화된 로그 출력 형식을 사용할지 여부
        - true - 단순 형식 사용 (스레드명과 클래스명 숨김)
        - false - 상세 형식 사용 (전체 스레드명, 클래스명 및 기타 디버그 정보 표시)
  optimization:
    comment: 최적화 관련 설정
    goal-selector-update-interval:
      comment:
        - 목표 선택기가 업데이트되는 시간(틱 단위)을 설정합니다.
        - 높은 값은 더 적은 리소스를 소모합니다.
        - 대신 몹의 목표 변경이 덜 자주 일어나게 됩니다.
  velocity:
    comment: Velocity Modern Forwarding 관련 설정
    debug-logging:
      comment:
        - 로그에 Velocity 포워딩 관련 디버그 정보를 표시할지 여부
        - 연결 문제 진단에 도움이 되도록 이 기능을 활성화하세요
    enabled:
      comment:
        - Velocity Modern Forwarding 지원을 활성화할지 여부
        - 활성화하면 Velocity 프록시 서버와의 통합이 가능합니다
    forwarding-secret:
      comment:
        - Velocity 포워딩 비밀 키
        - Velocity 설정 파일의 forwarding-secret와 정확히 일치해야 합니다
        - Velocity로부터의 연결 요청을 인증하는 데 사용됩니다
    online-mode:
      comment:
        - 온라인 모드 검증을 활성화할지 여부
        - 일반적으로 Velocity 설정의 online-mode 설정과 일치해야 합니다
