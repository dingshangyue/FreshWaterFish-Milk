comments:
  _v:
    comment:
      - 'Repository: https://github.com/QianMo0721/Luminara'
      - 'Issue Tracker: https://github.com/QianMo0721/Luminara/issues'
      - ''
      - ''
      - Config version number, do not edit.
  async-catcher:
    comment:
      - Async Catcher related settings
      - There are four modes, and BLOCK is recommended
      - NONE - Do nothing
      - DISPATCH - Non blocking-ly dispatch action to main thread
      - BLOCK - Run in main thread and wait for results
      - EXCEPTION - Raise an error
    dump:
      comment: Dump stack trace information in debug.log
  async-world-save:
    comment:
      - Async world save related settings
      - Asynchronously save world data during server shutdown to reduce shutdown time
    enabled:
      comment: Whether to enable async world save feature
    save-world-data:
      comment: Whether to include world data in async save
    timeout-seconds:
      comment:
        - Async save timeout in seconds
        - If save doesn't complete within this time, server will continue shutdown process
  compatibility:
    extra-logic-worlds:
      comment:
        - Extra worlds running logic
        - If any mods do not function well, try search class names in logs related to [EXT_LOGIC] and add them here
    forward-permission:
      comment:
        - true - Forward Forge permission query to Bukkit
        - false - Disable permission forward
        - reverse - Forward Bukkit player perimission query to Forge
    lenient-item-tag-match:
      comment:
        - Allows items with an empty nbt tag stack on no tag items
    preload-bungee-chat-classes:
      comment:
        - Whether to enable preloading of Bungee chat API classes at startup
        - This helps fix issues where some plugins wouldn't load the BungeeChat API properly
        - Set to false if you encounter compatibility issues with certain plugins
    symlink-world:
      comment:
        - Create symbol links to mod dimension folder that matches Bukkit world name
        - Enable this could improve plugin compotibility
        - Changing this on production server will cause changes to mod world names
        - '  and cause data loss on plugins relying world names'
        - See https://github.com/IzzelAliz/Arclight/wiki/World-Symlink for more detail
    valid-username-regex:
      comment:
        - Regex for valid username check. Leave it blank will fallback to vanilla check
        - 'Following allows Chinese characters:'
        - valid-username-regex = "^[ -~\\p{sc=Han}]{1,16}$"
        - 'Following allows any username to login:'
        - valid-username-regex = ".+"
  error-handling:
    comment:
      - Error handling related settings
      - Controls server behavior when encountering crashes and errors
    continue-on-crash:
      comment: Whether to continue running the server after a crash (default disabled, recommended to keep disabled)
    crash-report-directory:
      comment: Directory for storing crash report files
  locale:
    comment: Language/I18n settings
  logging:
    comment: Logging output related settings
    use-simple-format:
      comment:
        - Whether to use simplified log output format
        - true - Use simple format (hide thread names and class names)
        - false - Use detailed format (show full thread names, class names and other debug info)
  optimization:
    async-system:
      async-ai-enabled:
        comment: Whether to enable async AI
      async-collision-enabled:
        comment: Whether to enable async collision detection
      async-redstone-enabled:
        comment: Whether to enable async redstone
      comment: Async system related settings
      disable-on-error:
        comment: Whether to disable async system on error
      enabled:
        comment: Whether to enable async system
      event-class-blacklist:
        comment: Event class blacklist
      max-threads:
        comment: Maximum thread count
      mod-blacklist:
        comment: Mod blacklist
      strict-class-checking:
        comment: Whether to enable strict class checking
      timeout-seconds:
        comment: Timeout (seconds)
    cache-plugin-class:
      comment: Whether to cache plugin classes for better performance
    chunk-optimization:
      aggressive-chunk-unloading:
        comment: Whether to enable aggressive chunk unloading
      chunk-load-rate-limit:
        comment: Chunk loading rate limit
      chunk-unload-delay:
        comment: Chunk unload delay (ticks)
      comment: Chunk optimization related settings
      optimize-chunk-loading:
        comment: Whether to optimize chunk loading
    comment: Server optimization related settings
    entity-optimization:
      chunk-entity-limit:
        comment: Chunk entity limit
      clean-valuable-items:
        comment: Whether to clean valuable items
      cleanup-cancelled-message:
        comment: Cleanup cancelled message template
      cleanup-complete-message:
        comment: Cleanup complete message template
      cleanup-notification-enabled:
        comment: Whether to enable cleanup notifications
      cleanup-start-message:
        comment: Cleanup start message template
      cleanup-warning-time:
        comment: Cleanup warning time (seconds)
      comment: Entity optimization related settings
      disable-entity-collisions:
        comment: Whether to disable entity collision detection
      entity-check-interval:
        comment: Entity check interval (ticks)
      entity-cleanup-enabled:
        comment: Whether to enable entity cleanup feature
      entity-cleanup-threshold:
        comment: Entity count threshold to trigger cleanup
      entity-freeze-timeout:
        comment: Entity freeze timeout (milliseconds)
      entity-update-distance:
        comment: Entity update distance
      item-max-age:
        comment: Maximum item existence time (ticks)
      max-entities-per-chunk:
        comment: Maximum entities per chunk
      max-entities-per-type:
        comment: Maximum entities per type
      reduce-entity-updates:
        comment: Whether to reduce entity update frequency
    goal-selector-update-interval:
      comment:
        - Entity goal selector update interval
        - Higher values consume less resources
        - Causes entities to change goals less frequently
    memory-optimization:
      cache-cleanup-enabled:
        comment: Whether to enable cache cleanup
      cache-cleanup-interval:
        comment: Cache cleanup interval (seconds)
      comment: Memory optimization related settings
      entity-cleanup-enabled:
        comment: Whether to enable entity cleanup
    world-creation:
      async-world-data-loading:
        comment: Whether to load world data asynchronously
      comment: World creation related settings
      defer-spawn-area-preparation:
        comment: Whether to defer spawn area preparation
      early-world-list-addition:
        comment: Whether to add to world list early
      fast-world-creation:
        comment: Whether to enable fast world creation
      force-close-loading-screen:
        comment: Whether to force close loading screen
      max-concurrent-world-loads:
        comment: Maximum concurrent world loads
      optimize-world-border-setup:
        comment: Whether to optimize world border setup
      parallel-world-initialization:
        comment: Whether to initialize worlds in parallel
      skip-spawn-chunk-loading:
        comment: Whether to skip spawn chunk loading
      spawn-area-radius:
        comment: Spawn area radius
      world-init-timeout-seconds:
        comment: World initialization timeout (seconds)
  velocity:
    comment: Velocity Modern Forwarding related settings
    debug-logging:
      comment:
        - Whether to display Velocity forwarding related debug information in logs
        - Enable this to help diagnose connection issues
    enabled:
      comment:
        - Whether to enable Velocity Modern Forwarding support
        - When enabled, allows integration with Velocity proxy server
    forwarding-secret:
      comment:
        - Velocity forwarding secret key
        - Must exactly match the forwarding-secret in Velocity configuration file
        - Used to authenticate connection requests from Velocity
    online-mode:
      comment:
        - Whether to enable online mode verification
        - Should typically match the online-mode setting in Velocity configuration
