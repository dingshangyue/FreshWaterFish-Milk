_v = 1

locale {
  fallback = "zh_cn"
}
optimization {
  cache-plugin-class = true
  goal-selector-update-interval = 2
  entity-optimization {
    disable-entity-collisions = false
    optimize-entity-ai = true
    entity-activation-range = 32
    entity-cleanup-enabled = true
    entity-cleanup-threshold = 600
    entity-freeze-timeout = 10000
    optimize-entity-tick = true
    entity-tick-distance = 64.0
    reduce-entity-updates = true
    entity-update-distance = 64.0
    max-entities-per-chunk = 50
    max-entities-per-type = 100
    clean-valuable-items = false
    item-max-age = 6000
    cleanup-notification-enabled = true
    cleanup-warning-time = 30
    cleanup-start-message = "&6[Luminara] &eEntity cleanup starting in &c{time} &eseconds..."
    cleanup-complete-message = "&6[Luminara] &aEntity cleanup completed! Removed &c{total} &aentities (Dead: &c{dead}&a, Items: &c{items}&a, Dense: &c{dense}&a, Excess: &c{excess}&a)"
    cleanup-cancelled-message = "&6[Luminara] &cEntity cleanup cancelled."
  }
  chunk-optimization {
    aggressive-chunk-unloading = false
    chunk-unload-delay = 300
    optimize-chunk-loading = true
    chunk-load-rate-limit = 10
    chunk-gc-period = 600
  }
  memory-optimization {
    memory-clean-interval = 600
    enable-gc = false
    entity-cleanup-enabled = true
    cache-cleanup-enabled = true
    memory-threshold = 0.8
    aggressive-cleanup = false
  }
  async-system {
    enabled = true
    max-threads = 4
    async-ai-enabled = true
    async-collision-enabled = true
    async-redstone-enabled = false
    disable-on-error = true
    event-class-blacklist = [
      "net.minecraftforge.event.TickEvent",
      "net.minecraftforge.event.level.LevelTickEvent",
      "net.minecraftforge.event.entity.living.*"
    ]
    mod-blacklist = []
    strict-class-checking = false
    timeout-seconds = 30
  }
}
compatibility {
  material-property-overrides {
  }
  entity-property-overrides {
  }
  symlink-world = false
  extra-logic-worlds = [
    "com.example.mod.ExtraLogicWorld",
    "xyz.nucleoid.fantasy.RuntimeWorld"
  ]
  forward-permission = true
  valid-username-regex = ""
  lenient-item-tag-match = true
}
async-catcher {
  dump = true
  warn = true
  defaultOperation = block
  overrides {
  }
}
async-world-save {
  enabled = true
  timeout-seconds = 30
  save-world-data = true
}
velocity {
  enabled = false
  online-mode = false
  forwarding-secret = ""
  debug-logging = false
}