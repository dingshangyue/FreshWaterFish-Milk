_v = 1

locale {
  fallback = "zh_cn"
}
optimization {
  cache-plugin-class = true
  disable-data-fixer = false
  goal-selector-update-interval = 2
}
compatibility {
  material-property-overrides {
  }
  entity-property-overrides {
  }
  symlink-world = false
  extra-logic-worlds = [
    "com.example.mod.ExtraLogicWorld"
  ]
  forward-permission = true
  valid-username-regex = ""
  lenient-item-tag-match = true
}
async-catcher {
  dump = true
  warn = true
  defaultOperation = block
  overrides {
  }
}
async-world-save {
  enabled = true
  timeout-seconds = 30
  save-world-data = true
}
velocity {
  # Velocity Modern Forwarding 配置
  # 启用 Velocity Modern Forwarding 支持
  enabled = false
  # Velocity 转发密钥，必须与 Velocity 配置中的 forwarding-secret 一致
  forwarding-secret = ""
  # 是否在日志中显示 Velocity 转发相关的调试信息
  debug-logging = false
}