# FreshwaterFish Configuration File
# This is the YAML version of the configuration

# FreshwaterFish 服务端配置；问题请在本项目仓库或社区反馈
# Minebbs链接：https://www.minebbs.com/resources/freshwaterfish-mod.15791/
# 配置文件版本号，请勿编辑
_v: 1

# 语言/国际化相关设置
locale:
  fallback: "zh_cn"

# 服务端优化相关设置
optimization:
  # 是否缓存插件类以提高性能
  cache-plugin-class: true
  # 实体目标选择器的更新间隔
  # 数值越高消耗资源越少
  # 导致实体更改目标速度变慢
  goal-selector-update-interval: 3
  # 是否使用Spigot Activation Range和Tracking Range优化
  use-activation-and-tracking-range: true
  # 实体优化相关设置
  entity-optimization:
    # 是否禁用实体碰撞检测
    disable-entity-collisions: false
    # 是否减少实体更新频率
    reduce-entity-updates: true
    # 实体更新距离
    entity-update-distance: 64.0
    # 每个区块最大实体数量
    max-entities-per-chunk: 100
    # 每种类型最大实体数量
    max-entities-per-type: 150
  # 区块优化相关设置
  # 注意：当C2ME或Noisium模组存在时，区块优化将自动禁用以避免冲突
  chunk-optimization:
    # 是否启用激进的区块卸载
    aggressive-chunk-unloading: true
    # 区块卸载延迟（tick）
    chunk-unload-delay: 200
    # 是否优化区块加载
    optimize-chunk-loading: true
    # 区块加载速率限制
    chunk-load-rate-limit: 8
  # 内存优化相关设置
  memory-optimization:
    # 是否启用缓存清理
    cache-cleanup-enabled: true
    # 缓存清理间隔（秒）
    cache-cleanup-interval: 300
  # 异步系统相关设置
  async-system:
    # 是否启用异步系统
    enabled: true
    # 最大线程数
    max-threads: 6
    # 是否启用异步AI
    async-ai-enabled: true
    # 是否启用异步碰撞检测
    async-collision-enabled: false
    # 是否启用异步红石
    async-redstone-enabled: false
    # 出错时是否禁用异步系统
    disable-on-error: true
    # 事件类黑名单
    event-class-blacklist:
      - "net.minecraftforge.event.TickEvent"
      - "net.minecraftforge.event.level.LevelTickEvent"
      - "net.minecraftforge.event.entity.living.*"
    # 模组黑名单
    mod-blacklist: [ ]
    # 是否启用严格类检查
    strict-class-checking: true
    # 超时时间（秒）
    timeout-seconds: 20
  # 世界创建相关设置
  # 注意：当ModernFix模组存在时，并行世界加载将自动禁用以避免冲突
  world-creation:
    # 是否启用快速世界创建
    fast-world-creation: true
    # 是否跳过出生点区块加载
    skip-spawn-chunk-loading: true
    # 是否强制关闭加载屏幕
    force-close-loading-screen: true
    # 是否提前添加到世界列表
    early-world-list-addition: true
    # 是否并行初始化世界
    parallel-world-initialization: true
    # 世界初始化超时时间（秒）
    world-init-timeout-seconds: 45
    # 最大并发世界加载数
    max-concurrent-world-loads: 3
    # 是否优化世界边界设置
    optimize-world-border-setup: true
    # 是否延迟出生区域准备
    defer-spawn-area-preparation: true
    # 出生区域半径
    spawn-area-radius: 8
    # 是否异步加载世界数据
    async-world-data-loading: true

compatibility:
  material-property-overrides: { }
  entity-property-overrides: { }
  # 为模组的维度创建符号链接
  # 推荐启用以增强插件交互兼容性
  # 变更此设置会导致模组世界名称变化，可能造成依赖世界名称的插件数据丢失
  # 参见 https://github.com/QianMo0721/FreshwaterFish/wiki
  symlink-world: false
  # 额外运行逻辑的维度类名
  # 如果有模组世界/功能运行不正常，尝试在日志中搜索和 [EXT_LOGIC] 有关的对应类名并添加
  extra-logic-worlds:
    - "com.example.mod.ExtraLogicWorld"
    - "xyz.nucleoid.fantasy.RuntimeWorld"
  # true - 将 Forge 权限查询请求转发至 Bukkit
  # false - 不启用权限转发
  # reverse - 将 Bukkit 玩家权限查询请求转发至 Forge
  forward-permission: true
  # 用户名合法检查正则表达式，留空为使用原版检查
  # 如果需要允许中文字符可以使用
  # valid-username-regex = "^[ -~\p{sc=Han}]{1,16}$"
  # 如果允许任何用户名可以使用
  # valid-username-regex = ".+"
  valid-username-regex: ""
  # 允许空 NBT 标签的物品和没有 NBT 标签的物品堆叠
  lenient-item-tag-match: true
  # 是否在启动时预加载Bungee聊天API类
  # 这有助于修复某些插件无法正确加载BungeeChat API的问题
  # 如果您遇到某些插件的兼容性问题，可以设置为false
  preload-bungee-chat-classes: true
  enable-bukkit-reload-command: true

# 异步捕获相关设置
# Async Catcher 共有四种模式
# NONE - 保持在当前线程执行
# DISPATCH - 不阻塞地发布到主线程
# BLOCK - 发布到主线程并等待结果
# EXCEPTION - 抛出异常
async-catcher:
  # 是否在 debug 日志中打印堆栈信息
  dump: true
  warn: true
  defaultOperation: block
  overrides: { }

# 异步世界保存相关设置
# 在服务器关闭时异步保存世界数据，减少关服等待时间
async-world-save:
  # 是否启用异步世界保存功能
  enabled: true
  # 异步保存超时时间（秒）
  # 如果在指定时间内��存未完成，服务器将继续关闭流程
  timeout-seconds: 45
  # 是否在异步保存中包含世界数据
  save-world-data: true

# Velocity Modern 转发相关设置
velocity:
  # 是否启用 Velocity Modern 转发支持
  # 启用后可以与 Velocity 代理服务器配合使用
  enabled: false
  # 是否启用在线模式验证
  # 通常应与 Velocity 配置中的 online-mode 设置保持一致
  online-mode: false
  # Velocity 转发密钥
  # 必须与 Velocity 配置文件中的 forwarding-secret 完全一致
  # 用于验证来自 Velocity 的连接请求
  forwarding-secret: ""
  # 是否在日志中显示 Velocity 转发相关的调试信息
  # 启用后可以帮助诊断玩家连接问题
  debug-logging: false

# 错误处理相关设置
# 控制服务器在遇到崩溃和错误时的行为
error-handling:
  # 是否在崩溃后继续运行服务器（默认关闭，建议保持关闭）
  continue-on-crash: false
  # 崩溃报告文件存储目录
  crash-report-directory: "crash-reports"

# 日志输出相关设置
logging:
  # 是否使用简化的日志输出格式
  # true - 使用简洁格式（隐藏线程名和类名，类似Mohist风格）
  # false - 使用详细格式（显示完整的线程名、类名等调试信息）
  use-simple-format: false
